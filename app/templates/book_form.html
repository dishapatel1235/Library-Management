{% extends "base.html" %}

{% block page_title %}{% if book %}Edit Book{% else %}Add Book{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card-custom">
            <h4 class="card-title-custom mb-4">
                {% if book %}Edit Book Details{% else %}Add New Book{% endif %}
            </h4>

            <form method="post" action="{% if book %}/books/update/{{book.id}}{% else %}/books/add{% endif %}">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input name="title" class="form-control" value="{{book.title if book else ''}}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Author</label>
                    <input name="author" class="form-control" value="{{book.author if book else ''}}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">ISBN</label>
                    <input name="isbn" class="form-control" value="{{book.isbn if book else ''}}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Valuation Rate ($)</label>
                    <input name="valuation_rate" type="number" class="form-control"
                        value="{{book.valuation_rate if book else ''}}" required>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn-custom-red px-4">
                        Save Book
                    </button>
                    <a href="/books" class="btn-custom-outline px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
