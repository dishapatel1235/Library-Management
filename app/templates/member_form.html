{% extends "base.html" %}

{% block page_title %}{% if member %}Edit Member{% else %}Add Member{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card-custom">
            <h4 class="card-title-custom mb-4">
                {% if member %}Edit Member Profile{% else %}Add New Member{% endif %}
            </h4>

            <form method="post" action="{% if member %}/members/update/{{member.id}}{% else %}/members/add{% endif %}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input name="full_name" class="form-control" value="{{member.full_name if member else ''}}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{member.email if member else ''}}"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Membership Type</label>
                    <select name="membership_type" class="form-select">
                        <option value="Regular" {% if member and member.membership_type=="Regular" %}selected{% endif
                            %}>Regular</option>
                        <option value="Premium" {% if member and member.membership_type=="Premium" %}selected{% endif
                            %}>Premium</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn-custom-red px-4">
                        Save Member
                    </button>
                    <a href="/members" class="btn-custom-outline px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
