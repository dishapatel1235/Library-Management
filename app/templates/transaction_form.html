{% extends "base.html" %}

{% block page_title %}Create Transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card-custom">
      <h4 class="card-title-custom mb-4">Issue Books</h4>

      <form method="post" action="/transactions/add">
        <div class="mb-3">
          <label class="form-label">Select Member</label>
          <select name="member_id" class="form-select" required>
            <option value="">-- Select Member --</option>
            {% for m in members %}
            <option value="{{m.id}}">{{m.full_name}} (ID: #M-{{ '%04d' % m.id }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label d-block mb-3">Select Books to Issue</label>
          <div class="card p-3"
            style="background: var(--bg-dark); border: 1px solid var(--border-color); max-height: 250px; overflow-y: auto;">
            {% for b in books %}
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" name="book_ids" value="{{b.id}}" id="book{{b.id}}"
                style="background-color: var(--bg-card); border-color: var(--border-color);">
              <label class="form-check-label text-white" for="book{{b.id}}">
                {{b.title}} <span class="text-muted" style="font-size: 0.85rem;">by {{b.author}}</span>
              </label>
            </div>
            {% endfor %}
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn-custom-red px-4">
            Create Transaction
          </button>
          <a href="/transactions" class="btn-custom-outline px-4">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% block extra_scripts %}
<script>
  document.querySelector('form').addEventListener('submit', function (e) {
    const checkboxes = document.querySelectorAll('input[name="book_ids"]:checked');
    if (checkboxes.length === 0) {
      e.preventDefault();
      alert('Please select at least one book to issue.');
    }
  });
</script>
{% endblock %}
{% endblock %}
